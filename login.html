<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ClinicPro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-clinic-medical"></i>
                    <h2>Clinic<span>Pro</span></h2>
                </div>
                <h1>Create Account</h1>
                <p>Start your 14-day free trial</p>
            </div>

            <form id="signupForm" class="auth-form">

                <div class="form-group">
                    <label for="name">
                        <i class="fas fa-user"></i>
                        Full Name
                    </label>
                    <input type="text" id="name" placeholder="  " required>
                </div>


                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input type="email" id="email" placeholder="doctor@clinic.com" required>
                </div>


                <div class="form-group">
                    <label for="clinicName">
                        <i class="fas fa-clinic-medical"></i>
                        Clinic Name
                    </label>
                    <input type="text" id="clinicName" placeholder="City Medical Center" required>
                </div>

                <div class="form-group">
                    <label for="phone">
                        <i class="fas fa-phone"></i>
                        Phone Number
                    </label>
                    <input type="tel" id="phone" placeholder="+1 234 567 8900" required>
                </div>


                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" placeholder="Create password" required>
                        <button type="button" class="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>


                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-lock"></i>
                        Confirm Password
                    </label>
                    <div class="password-input">
                        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                        <button type="button" class="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>


                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" required>
                        I agree to the <a href="#">Terms</a> & <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn-primary btn-full">
                    <i class="fas fa-user-plus"></i>
                    Sign Up
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>

            <div class="auth-divider">
                <span>or sign up with</span>
            </div>

            <div class="social-login">
                <button class="btn-social google">
                    <i class="fab fa-google"></i>
                    Google
                </button>
                <button class="btn-social facebook">
                    <i class="fab fa-facebook-f"></i>
                    Facebook
                </button>
            </div>
        </div>

        <div class="auth-image">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8LaTVTxjKSfUKU9PfhlqTG7Zydy_jLxJr7Q&s"
                alt="Clinic">
            <div class="features-list">
                <h3>Why choose ClinicPro?</h3>
                <ul>
                    <li><i class="fas fa-check-circle"></i> 14-day free trial</li>
                    <li><i class="fas fa-check-circle"></i> No credit card required</li>
                    <li><i class="fas fa-check-circle"></i> 24/7 support</li>
                    <li><i class="fas fa-check-circle"></i> Cancel anytime</li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


        const firebaseConfig = {
            apiKey: "AIzaSyAA1XctIHbzSBDtqYk3Qu2DIkjeVUzp4no",
            authDomain: "clinic-2026.firebaseapp.com",
            projectId: "clinic-2026",
            storageBucket: "clinic-2026.firebasestorage.app",
            messagingSenderId: "759775628649",
            appId: "1:759775628649:web:05f4f4828f6392dc5841f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);


        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function () {
                const passwordInput = this.previousElementSibling;
                const icon = this.querySelector('i');

                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        });


        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const clinicName = document.getElementById('clinicName').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;


            if (password !== confirmPassword) {
                alert('❌ Passwords do not match!');
                return;
            }

            if (password.length < 6) {
                alert('❌ Password must be at least 6 characters long');
                return;
            }

            try {

                const submitBtn = e.target.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
                submitBtn.disabled = true;

                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    name: name,
                    email: email,
                    clinicName: clinicName,
                    phone: phone,
                    role: 'admin',
                    plan: 'trial',
                    trialStartDate: new Date().toISOString(),
                    trialEndDate: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString(),
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                });

                await setDoc(doc(db, "clinics", user.uid), {
                    name: clinicName,
                    phone: phone,
                    email: email,
                    adminId: user.uid,
                    createdAt: new Date().toISOString(),
                    settings: {
                        appointmentDuration: 15,
                        workingHours: {
                            monday: { start: '09:00', end: '17:00', isOpen: true },
                            tuesday: { start: '09:00', end: '17:00', isOpen: true },
                            wednesday: { start: '09:00', end: '17:00', isOpen: true },
                            thursday: { start: '09:00', end: '17:00', isOpen: true },
                            friday: { start: '09:00', end: '17:00', isOpen: true },
                            saturday: { start: '09:00', end: '13:00', isOpen: true },
                            sunday: { start: 'closed', end: 'closed', isOpen: false }
                        }
                    }
                });
 
                alert('✅ Account created successfully! Welcome to ClinicPro.');

          
                window.location.href = 'dashboard.html';

            } catch (error) {
                console.error("Signup error:", error);
 
                let errorMessage = '❌ Signup failed: ';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage += 'Email already in use';
                        break;
                    case 'auth/invalid-email':
                        errorMessage += 'Invalid email address';
                        break;
                    case 'auth/weak-password':
                        errorMessage += 'Password is too weak';
                        break;
                    default:
                        errorMessage += error.message;
                }

                alert(errorMessage);
 
                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Sign Up';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
